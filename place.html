<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ecuador</title>

    <meta name="description" content="Discover Ecuador, its culture, weather, and beautiful landscapes in South America.">

    <meta name="author" content="Stephano Martinez">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Ecuador</h1>
    </header>

    <main>

        <picture>
            <source srcset="images/hero-large.webp" media="(min-width: 768px)">

            <img src="images/hero-small.webp" alt="Landscape of Ecuador">
        </picture>

        <section class="data">
            <h2>Data</h2>

            <p><strong>Capital:</strong> Quito</p>
            <p><strong>Population:</strong> 18 million</p>
            <p><strong>Language:</strong> Spanish</p>
            <p><strong>Currency:</strong> USD</p>
            <p><strong>Region:</strong> South America</p>
        </section>

        <section class="weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="weather icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temperature">8</span> °C</p>

            <p><strong>Wind Speed:</strong> <span id="windspeed">10</span> km/h</p>

            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </section>

    </main>

    <footer>
        <p>
            &copy; <span id="currentyear"></span> Stephano Martinez | Ecuador
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
